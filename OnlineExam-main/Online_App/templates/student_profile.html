<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4e73df;
            --primary-dark: #2e59d9;
            --secondary: #1cc88a;
            --danger: #e74a3b;
            --warning: #f6c23e;
            --info: #36b9cc;
            --light: #f8f9fc;
            --dark: #5a5c69;
            --gray: #858796;
            --light-gray: #dddfeb;
            --shadow-sm: 0 0.15rem 0.35rem rgba(0, 0, 0, 0.08);
            --shadow-md: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
            --shadow-lg: 0 1rem 3rem rgba(0, 0, 0, 0.175);
            --transition: all 0.3s ease-in-out;
            --border-radius: 0.35rem;
            --border-radius-lg: 0.5rem;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8f9fc;
            color: var(--dark);
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            width: 90%;
            max-width: 1200px;
            margin: 30px auto;
            background: white;
            padding: 40px;
            box-shadow: var(--shadow-lg);
            border-radius: var(--border-radius-lg);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }
        
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }
        
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--light);
            border-radius: 50%;
            font-size: 1.2rem;
            color: var(--gray);
            cursor: pointer;
            transition: var(--transition);
            z-index: 10;
            box-shadow: var(--shadow-sm);
            border: none;
            text-decoration: none;
        }
        
        .close-btn:hover {
            background: var(--danger);
            color: white;
            transform: rotate(90deg) scale(1.1);
            box-shadow: 0 4px 12px rgba(231, 74, 59, 0.3);
        }
        
        h2 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 30px;
            font-size: 2.2rem;
            font-weight: 600;
            position: relative;
            padding-bottom: 15px;
        }
        
        h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 2px;
        }
        
        .form-section {
            background: white;
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-sm);
            margin-bottom: 40px;
            transition: var(--transition);
            border: 1px solid var(--light-gray);
        }
        
        .form-section:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }
        
        .form-group.full-width {
            grid-column: span 2;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--dark);
            font-size: 0.9rem;
        }
        
        label.required::after {
            content: '*';
            color: var(--danger);
            margin-left: 4px;
        }
        
        .form-icon {
            position: absolute;
            right: 15px;
            top: 38px;
            color: var(--gray);
            font-size: 1rem;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--light-gray);
            border-radius: var(--border-radius);
            font-size: 0.95rem;
            transition: var(--transition);
            background-color: var(--light);
            font-family: 'Poppins', sans-serif;
        }
        
        input:focus, select:focus, textarea:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 3px rgba(78, 115, 223, 0.25);
            background-color: white;
        }
        
        textarea {
            min-height: 120px;
            resize: vertical;
        }
        
        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 10px center;
            background-size: 1em;
        }
        
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 24px;
            border: none;
            border-radius: var(--border-radius);
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
        }
        
        .btn i {
            font-size: 0.9rem;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            box-shadow: 0 4px 12px rgba(78, 115, 223, 0.3);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(78, 115, 223, 0.4);
            background: linear-gradient(135deg, var(--primary-dark), var(--primary));
        }
        
        .btn-danger {
            background: linear-gradient(135deg, var(--danger), #d62e1f);
            color: white;
            box-shadow: 0 4px 12px rgba(231, 74, 59, 0.3);
        }
        
        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(231, 74, 59, 0.4);
            background: linear-gradient(135deg, #d62e1f, var(--danger));
        }
        
        .btn-success {
            background: linear-gradient(135deg, var(--secondary), #17a673);
            color: white;
            box-shadow: 0 4px 12px rgba(28, 200, 138, 0.3);
        }
        
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(28, 200, 138, 0.4);
        }
        
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 30px;
            box-shadow: var(--shadow-sm);
            border-radius: var(--border-radius);
            overflow: hidden;
            background: white;
        }
        
        thead {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }
        
        th {
            padding: 15px;
            text-align: center;
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }
        
        th:first-child {
            border-top-left-radius: var(--border-radius);
        }
        
        th:last-child {
            border-top-right-radius: var(--border-radius);
        }
        
        td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid var(--light-gray);
            background: white;
            font-size: 0.9rem;
        }
        
        tr:last-child td {
            border-bottom: none;
        }
        
        tr:hover td {
            background: #f5f8ff;
        }
        
        .action-cell {
            display: flex;
            justify-content: center;
            gap: 8px;
        }
        
        .action-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: var(--transition);
        }
        
        .action-btn:hover {
            transform: scale(1.1);
        }
        
        .edit-btn {
            background: var(--info);
            color: white;
        }
        
        .delete-btn {
            background: var(--danger);
            color: white;
        }
        
        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        
        .status-active {
            background-color: rgba(28, 200, 138, 0.1);
            color: var(--secondary);
        }
        
        .status-inactive {
            background-color: rgba(231, 74, 59, 0.1);
            color: var(--danger);
        }
        
        /* Responsive adjustments */
        @media (max-width: 992px) {
            .container {
                width: 95%;
                padding: 30px;
            }
            
            h2 {
                font-size: 2rem;
            }
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 25px;
            }
            
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .form-group.full-width {
                grid-column: span 1;
            }
            
            h2 {
                font-size: 1.8rem;
            }
            
            .action-cell {
                flex-direction: column;
                align-items: center;
            }
        }
        
        /* Toast notification */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            background: var(--secondary);
            color: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-lg);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateX(150%);
            transition: transform 0.3s ease-out;
        }
        
        .toast.show {
            transform: translateX(0);
        }
        
        .toast.error {
            background: var(--danger);
        }
        
        .toast i {
            font-size: 1.2rem;
        }
        
        /* Loading spinner */
        .spinner {
            display: none;
            width: 40px;
            height: 40px;
            margin: 20px auto;
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Section headers */
        .section-header {
            display: flex;
            align-items: center;
            margin: 25px 0 15px;
            color: var(--primary);
        }
        
        .section-header::before {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--light-gray);
            margin-right: 15px;
        }
        
        .section-header::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--light-gray);
            margin-left: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Close button that redirects to admin dashboard -->
    <a href="{% url 'admin_dashboard' %}" class="close-btn" title="Return to Dashboard">
        <i class="fas fa-arrow-left"></i>
    </a>
    
    <h2>Student Management</h2>
    
    <!-- Display messages -->
    
    <div class="form-section">
        <form id="studentForm" method="post">
            {% csrf_token %}
            
            <div class="section-header">
                <span>Personal Information</span>
            </div>
            
            <div class="form-grid">
                <div class="form-group">
                    <label for="first_name" class="required">First Name</label>
                    <input type="text" id="first_name" name="first_name" required placeholder="John" value="{{ request.POST.first_name }}">
                    <i class="fas fa-user form-icon"></i>
                </div>
                
                <div class="form-group">
                    <label for="last_name" class="required">Last Name</label>
                    <input type="text" id="last_name" name="last_name" required placeholder="Doe" value="{{ request.POST.last_name }}">
                    <i class="fas fa-user form-icon"></i>
                </div>
                
                <div class="form-group">
                    <label for="date_of_birth" class="required">Date of Birth</label>
                    <input type="date" id="date_of_birth" name="date_of_birth" required value="{{ request.POST.date_of_birth }}">
                    <i class="fas fa-calendar-alt form-icon"></i>
                </div>
                
                <div class="form-group">
                    <label for="gender" class="required">Gender</label>
                    <select id="gender" name="gender" required>
                        <option value="">Select Gender</option>
                        <option value="Male" {% if request.POST.gender == 'Male' %}selected{% endif %}>Male</option>
                        <option value="Female" {% if request.POST.gender == 'Female' %}selected{% endif %}>Female</option>
                        <option value="Other" {% if request.POST.gender == 'Other' %}selected{% endif %}>Other</option>
                    </select>
                    <i class="fas fa-venus-mars form-icon"></i>
                </div>
                
                <div class="form-group">
                    <label for="mobile_number" class="required">Mobile Number</label>
                    <input type="tel" id="mobile_number" name="mobile_number" required placeholder="+1 234 567 8900" value="{{ request.POST.mobile_number }}">
                    <i class="fas fa-phone form-icon"></i>
                </div>
                
                <div class="form-group">
                    <label for="email" class="required">Email</label>
                    <input type="email" id="email" name="email" required placeholder="john.doe@example.com" value="{{ request.POST.email }}">
                    <i class="fas fa-envelope form-icon"></i>
                </div>
                
                <div class="form-group full-width">
                    <label for="address" class="required">Address</label>
                    <textarea id="address" name="address" required placeholder="123 Main Street, City, State, Country">{{ request.POST.address }}</textarea>
                    <i class="fas fa-map-marker-alt form-icon" style="top: 20px;"></i>
                </div>
                
                <div class="form-group">
                    <label for="pin_code" class="required">Pin Code</label>
                    <input type="text" id="pin_code" name="pin_code" required placeholder="123456" value="{{ request.POST.pin_code }}">
                    <i class="fas fa-map-pin form-icon"></i>
                </div>
            </div>
            
            <div class="section-header">
                <span>Guardian Information</span>
            </div>
            
            <div class="form-grid">
                <div class="form-group">
                    <label for="guardian_name" class="required">Guardian Name</label>
                    <input type="text" id="guardian_name" name="guardian_name" required placeholder="Parent/Guardian Name" value="{{ request.POST.guardian_name }}">
                    <i class="fas fa-user-shield form-icon"></i>
                </div>
                
                <div class="form-group">
                    <label for="guardian_number" class="required">Guardian Number</label>
                    <input type="tel" id="guardian_number" name="guardian_number" required placeholder="+1 234 567 8900" value="{{ request.POST.guardian_number }}">
                    <i class="fas fa-phone form-icon"></i>
                </div>
            </div>
            
            <div class="section-header">
                <span>Academic Information</span>
            </div>
            
            <div class="form-grid">
                <div class="form-group">
                    <label for="course_applied_for" class="required">Course Applied For</label>
                    <input type="text" id="course_applied_for" name="course_applied_for" required placeholder="Course Name" value="{{ request.POST.course_applied_for }}">
                    <i class="fas fa-graduation-cap form-icon"></i>
                </div>
                
                <div class="form-group">
                    <label for="classX_board">Class X Board</label>
                    <input type="text" id="classX_board" name="classX_board" placeholder="Board Name" value="{{ request.POST.classX_board }}">
                    <i class="fas fa-school form-icon"></i>
                </div>
                
                <div class="form-group">
                    <label for="classX_percentage">Class X Percentage</label>
                    <input type="number" step="0.01" id="classX_percentage" name="classX_percentage" placeholder="Percentage" value="{{ request.POST.classX_percentage }}">
                    <i class="fas fa-percentage form-icon"></i>
                </div>
                
                <div class="form-group">
                    <label for="classX_year">Class X Year</label>
                    <input type="number" id="classX_year" name="classX_year" placeholder="Year" value="{{ request.POST.classX_year }}">
                    <i class="fas fa-calendar form-icon"></i>
                </div>
                
                <div class="form-group">
                    <label for="classXII_board">Class XII Board</label>
                    <input type="text" id="classXII_board" name="classXII_board" placeholder="Board Name" value="{{ request.POST.classXII_board }}">
                    <i class="fas fa-school form-icon"></i>
                </div>
                
                <div class="form-group">
                    <label for="classXII_percentage">Class XII Percentage</label>
                    <input type="number" step="0.01" id="classXII_percentage" name="classXII_percentage" placeholder="Percentage" value="{{ request.POST.classXII_percentage }}">
                    <i class="fas fa-percentage form-icon"></i>
                </div>
                
                <div class="form-group">
                    <label for="classXII_year">Class XII Year</label>
                    <input type="number" id="classXII_year" name="classXII_year" placeholder="Year" value="{{ request.POST.classXII_year }}">
                    <i class="fas fa-calendar form-icon"></i>
                </div>
            </div>
            
            <div class="btn-group">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-user-plus"></i> Add Student
                </button>
                <button type="reset" class="btn btn-danger">
                    <i class="fas fa-undo"></i> Reset Form
                </button>
            </div>
        </form>
    </div>

    <div id="loadingSpinner" class="spinner"></div>

</div>

<script>
    // Enhanced close button functionality
    document.querySelector('.close-btn').addEventListener('click', function(e) {
        e.preventDefault();
        document.querySelector('.container').style.opacity = '0';
        document.querySelector('.container').style.transform = 'translateY(20px)';
        setTimeout(() => {
            window.location.href = this.getAttribute('href');
        }, 300);
    });

    // Form submission handling
    document.getElementById('studentForm').addEventListener('submit', function(e) {
        // Show loading spinner
        document.getElementById('loadingSpinner').style.display = 'block';
    });

    // Auto-hide messages after 5 seconds
    setTimeout(() => {
        const messages = document.querySelectorAll('.toast');
        messages.forEach(msg => {
            msg.style.opacity = '0';
            setTimeout(() => msg.remove(), 300);
        });
    }, 5000);
</script>

</body>
</html>
