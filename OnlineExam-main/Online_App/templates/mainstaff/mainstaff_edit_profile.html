<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Profile - Main Staff</title>

    <!-- Font Awesome Icons -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 40px;
        }

        .container {
            background: white;
            max-width: 600px;
            margin: auto;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }

        input, img {
            width: 100%;
            padding: 12px;
            margin-top: 6px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            margin-top: 25px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #43a047;
        }

        .back-btn {
            background: #3b5998;
        }

        .back-btn:hover {
            background: #324b85;
        }

        .profile-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            margin: 10px auto 20px auto;
        }
    </style>
</head>
<body>

<div class="container">
    <h2><i class="fa-solid fa-user-pen"></i> Edit Profile</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <!-- Profile Photo Preview -->
        <img src=""
             class="profile-img"
             onerror="this.src='/static/default_user.png'">

        <label><i class="fa-solid fa-camera"></i> Profile Photo</label>
        <input type="file" name="profile_photo">

        <label><i class="fa-solid fa-user"></i> Name</label>
        <input type="text" name="name" value="{{ mainstaff.name }}" required>

        <label><i class="fa-solid fa-envelope"></i> Email</label>
        <input type="email" name="email" value="{{ mainstaff.email }}" required>

        <label><i class="fa-solid fa-phone"></i> Phone</label>
        <input type="text" name="phone" value="{{ mainstaff.phone }}">

        <label><i class="fa-solid fa-calendar"></i> Joined Date</label>
        <input type="date" name="joined_date" value="{{ mainstaff.joined_date|date:'Y-m-d' }}">

        <button class="btn"><i class="fa-solid fa-save"></i> Save Changes</button>

        <a href="{% url 'mainstaff_dashboard' %}">
            <button type="button" class="btn back-btn">
                <i class="fa-solid fa-arrow-left"></i> Back
            </button>
        </a>

    </form>
</div>

</body>
</html>
