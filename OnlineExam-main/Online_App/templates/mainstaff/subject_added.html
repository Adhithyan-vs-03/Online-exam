<!DOCTYPE html>
<html>
<head>
    <title>Subject Added</title>
    <style>
        body {
            font-family: "Segoe UI";
            background: #f0f8ff;
            padding: 40px;
            text-align: center;
        }

        .card {
            width: 400px;
            margin: auto;
            padding: 25px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        h2 {
            color: #0d9488;
        }

        .btn {
            display: block;
            padding: 12px;
            margin: 10px 0;
            background: #0d9488;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn:hover {
            background: #0f766e;
        }

        .secondary {
            background: #1e293b;
        }
    </style>
</head>

<body>

<div class="card">
    <h2>Subject Added Successfully!</h2>

    <p><b>Subject:</b> {{ subject.name }}</p>

    <a href="{% url 'add_chapter' subject.id %}" class="btn">➕ Add Chapters for this Subject</a>
    <a href="{% url 'add_subject' %}" class="btn">➕ Add Another Subject</a>
    <a href="" class="btn secondary">📄 View All Subjects</a>
</div>

</body>
</html>
