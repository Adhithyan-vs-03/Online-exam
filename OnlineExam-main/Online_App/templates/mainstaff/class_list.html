<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Select Class</title>
  <style>
    body { font-family: "Segoe UI", sans-serif; background: #f1f4f8; padding: 40px; }
    .card { max-width:800px; margin:auto; background:#fff; padding:24px; border-radius:12px; box-shadow:0 8px 20px rgba(0,0,0,0.08); }
    h1 { color:#1a73e8; margin:0 0 16px; }
    .class-list { margin-top:12px; }
    .class-item { padding:12px 14px; border-radius:8px; margin:8px 0; background:#f9fbff;
                  display:flex; justify-content:space-between; align-items:center;
                  border:1px solid #eef3ff; text-decoration:none; color:#0b2140; }
    .class-item a { text-decoration:none; color:inherit; width:100%; display:block; }
    .btn { padding:8px 12px; background:#1a73e8; color:#fff; border-radius:8px; text-decoration:none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Select a Class</h1>
    <p>Click a class to open its details.</p>

    <div class="class-list">
      {% if classes %}
        {% for c in classes %}
          <div class="class-item">
            <a href="{% url 'class_details' class_id=c.id %}">Class {{ c.class_name }}</a>
            <a class="btn" href="{% url 'class_details' class_id=c.id %}">Open</a>
          </div>
        {% endfor %}
      {% else %}
        <p>No classes found.</p>
      {% endif %}
    </div>

    <p style="margin-top:16px;">
      <a href="{% url 'mainstaff_dashboard' %}">← Back to Dashboard</a>
    </p>
  </div>
</body>
</html>
