{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container mx-auto px-4 py-6">
    <!-- Header -->
    <div class="mb-6">
        <h1 class="text-2xl font-bold text-gray-800">Edit Questions: {{ paper_title }}</h1>
        <p class="text-gray-600 mt-2">Edit the questions for this paper. Changes are saved automatically.</p>
    </div>
    
    <!-- Current Questions -->
    <div class="bg-white rounded-lg shadow-md p-6 mb-6">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-semibold text-gray-700">Current Questions</h2>
            <div class="text-sm text-gray-500">
                <span id="question-count">0</span> questions • 
                <span id="total-marks">0</span> marks
            </div>
        </div>
        
        <div id="questions-container" class="space-y-4">
            <!-- Questions will be loaded here by JavaScript -->
            <div class="text-center py-8 text-gray-500" id="no-questions-message">
                No questions added yet.
            </div>
        </div>
    </div>
    
    <!-- Save Button -->
    <div class="flex justify-end gap-3 mt-6">
        <a href="{% url 'teacher_generated_papers' %}" 
           class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50">
            Cancel
        </a>
        <button id="save-btn" 
                class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
            Save Changes
        </button>
    </div>
</div>

<script>
// Global variables accessible to all functions
let questions = [];
let currentEditIndex = null;
let paperId = {{ paper.id }};

// Initialize when page loads
document.addEventListener('DOMContentLoaded', function() {
    // Initialize questions from template
    questions = {{ existing_questions_json|safe }};
    
    // Initialize display
    updateQuestionCount();
    renderQuestions();
    
    // Setup save button
    document.getElementById('save-btn').addEventListener('click', saveAllChanges);
});

// =================== QUESTION MANIPULATION FUNCTIONS ===================

// Remove question
function removeQuestion(index) {
    if (confirm('Are you sure you want to remove this question?')) {
        questions.splice(index, 1);
        updateQuestionCount();
        renderQuestions();
        showToast('Question removed', 'success');
    }
}

// Quick edit question text
function editQuestionText(index) {
    const question = questions[index];
    const newQuestion = prompt("Edit question text:", question.question);
    if (newQuestion !== null && newQuestion.trim() !== '') {
        questions[index].question = newQuestion.trim();
        renderQuestions();
        showToast('Question text updated', 'success');
    }
}

// Quick edit marks
function editQuestionMarks(index) {
    const question = questions[index];
    const newMarks = prompt("Enter marks for this question:", question.marks || 1);
    if (newMarks !== null) {
        const marks = parseInt(newMarks);
        if (!isNaN(marks) && marks > 0) {
            questions[index].marks = marks;
            updateQuestionCount();
            renderQuestions();
            showToast('Marks updated', 'success');
        } else {
            alert('Please enter a valid number greater than 0');
        }
    }
}

// Edit question details (full edit)
function editQuestionDetails(index) {
    currentEditIndex = index;
    const question = questions[index];
    
    // Create modal HTML
    const modalHtml = `
        <div id="edit-question-modal" class="fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full z-50">
            <div class="relative top-20 mx-auto p-5 border w-11/12 md:w-3/4 max-w-3xl shadow-lg rounded-md bg-white">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-medium text-gray-900">Edit Question Details (Q${index + 1})</h3>
                    <button id="close-modal-btn" class="text-gray-400 hover:text-gray-600 text-2xl">
                        &times;
                    </button>
                </div>
                
                <div class="space-y-4 max-h-[60vh] overflow-y-auto pr-2">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Question *</label>
                        <textarea id="edit-question-text" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500" rows="4">${escapeHtml(question.question || '')}</textarea>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Marks *</label>
                            <input type="number" id="edit-question-marks" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500" value="${question.marks || 1}" min="1" step="1">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Subject</label>
                            <input type="text" id="edit-question-subject" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500" value="${escapeHtml(question.subject_name || '')}">
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Chapter</label>
                            <input type="text" id="edit-question-chapter" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500" value="${escapeHtml(question.chapter || '')}">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Topic</label>
                            <input type="text" id="edit-question-topic" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500" value="${escapeHtml(question.topic || '')}">
                        </div>
                    </div>
                    
                    ${question.type === 'objective' ? `
                    <div class="border-t pt-4 mt-4">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Options (for MCQ)</label>
                        <div class="space-y-3">
                            <div>
                                <div class="flex items-center mb-1">
                                    <span class="w-6 text-center font-medium text-gray-600">A</span>
                                    <label class="ml-2 text-sm text-gray-600">Option A</label>
                                </div>
                                <input type="text" id="edit-question-option1" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500" value="${escapeHtml(question.option1 || '')}">
                            </div>
                            <div>
                                <div class="flex items-center mb-1">
                                    <span class="w-6 text-center font-medium text-gray-600">B</span>
                                    <label class="ml-2 text-sm text-gray-600">Option B</label>
                                </div>
                                <input type="text" id="edit-question-option2" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500" value="${escapeHtml(question.option2 || '')}">
                            </div>
                            <div>
                                <div class="flex items-center mb-1">
                                    <span class="w-6 text-center font-medium text-gray-600">C</span>
                                    <label class="ml-2 text-sm text-gray-600">Option C</label>
                                </div>
                                <input type="text" id="edit-question-option3" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500" value="${escapeHtml(question.option3 || '')}">
                            </div>
                            <div>
                                <div class="flex items-center mb-1">
                                    <span class="w-6 text-center font-medium text-gray-600">D</span>
                                    <label class="ml-2 text-sm text-gray-600">Option D</label>
                                </div>
                                <input type="text" id="edit-question-option4" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500" value="${escapeHtml(question.option4 || '')}">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Correct Answer(s)</label>
                                <input type="text" id="edit-question-correct-answer" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500" value="${escapeHtml(question.correct_answer || '')}" placeholder="A, B, C, etc.">
                                <p class="text-xs text-gray-500 mt-1">For multiple correct answers, separate with commas (e.g., "A, C")</p>
                            </div>
                        </div>
                    </div>
                    ` : `
                    <div class="border-t pt-4 mt-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Answer</label>
                        <textarea id="edit-question-answer" class="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:border-blue-500" rows="3">${escapeHtml(question.answer || '')}</textarea>
                    </div>
                    `}
                </div>
                
                <div class="flex justify-end gap-3 mt-6 pt-4 border-t">
                    <button id="cancel-edit-btn" class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50">Cancel</button>
                    <button id="save-edit-btn" class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Save Changes</button>
                </div>
            </div>
        </div>
    `;
    
    // Remove any existing modal
    const existingModal = document.getElementById('edit-question-modal');
    if (existingModal) {
        existingModal.remove();
    }
    
    // Add modal to body
    document.body.insertAdjacentHTML('beforeend', modalHtml);
    
    // Add event listeners to modal buttons
    document.getElementById('close-modal-btn').addEventListener('click', closeModal);
    document.getElementById('cancel-edit-btn').addEventListener('click', closeModal);
    document.getElementById('save-edit-btn').addEventListener('click', saveEditedQuestion);
    
    // Close on ESC key
    document.addEventListener('keydown', function modalKeyHandler(e) {
        if (e.key === 'Escape') {
            closeModal();
            document.removeEventListener('keydown', modalKeyHandler);
        }
    });
}

// Close modal
function closeModal() {
    const modal = document.getElementById('edit-question-modal');
    if (modal) {
        modal.remove();
    }
    currentEditIndex = null;
}

// Save edited question from modal
function saveEditedQuestion() {
    if (currentEditIndex === null) return;
    
    // Get form values
    const questionText = document.getElementById('edit-question-text').value;
    const marks = parseInt(document.getElementById('edit-question-marks').value);
    const subject = document.getElementById('edit-question-subject').value;
    const chapter = document.getElementById('edit-question-chapter').value;
    const topic = document.getElementById('edit-question-topic').value;
    
    // Validation
    if (!questionText.trim()) {
        alert('Question text is required');
        document.getElementById('edit-question-text').focus();
        return;
    }
    
    if (isNaN(marks) || marks < 1) {
        alert('Please enter valid marks (minimum 1)');
        document.getElementById('edit-question-marks').focus();
        return;
    }
    
    // Update the question in the array
    const updatedQuestion = {
        ...questions[currentEditIndex], // Keep existing properties
        question: questionText.trim(),
        marks: marks,
        subject_name: subject.trim(),
        chapter: chapter.trim(),
        topic: topic.trim()
    };
    
    // Update options if it's an objective question
    if (updatedQuestion.type === 'objective') {
        updatedQuestion.option1 = document.getElementById('edit-question-option1').value.trim();
        updatedQuestion.option2 = document.getElementById('edit-question-option2').value.trim();
        updatedQuestion.option3 = document.getElementById('edit-question-option3').value.trim();
        updatedQuestion.option4 = document.getElementById('edit-question-option4').value.trim();
        updatedQuestion.correct_answer = document.getElementById('edit-question-correct-answer').value.trim();
    } else {
        updatedQuestion.answer = document.getElementById('edit-question-answer').value.trim();
    }
    
    // Replace the question in the array
    questions[currentEditIndex] = updatedQuestion;
    
    // Close modal and update display
    closeModal();
    updateQuestionCount();
    renderQuestions();
    
    showToast('Question updated successfully!', 'success');
}

// =================== DISPLAY FUNCTIONS ===================

// Render all questions
function renderQuestions() {
    const container = document.getElementById('questions-container');
    
    if (questions.length === 0) {
        // Show "no questions" message
        container.innerHTML = '<div class="text-center py-8 text-gray-500" id="no-questions-message">No questions added yet.</div>';
        return;
    }
    
    // Build HTML for questions
    let html = '';
    questions.forEach((q, index) => {
        const questionText = q.question || '';
        const displayText = questionText.length > 150 ? questionText.substring(0, 150) + '...' : questionText;
        
        html += `
        <div class="border rounded-lg p-4 hover:bg-gray-50 transition-colors duration-200">
            <div class="flex justify-between items-start">
                <div class="flex-1">
                    <div class="flex flex-wrap items-center gap-2 mb-2">
                        <span class="px-2 py-1 bg-blue-100 text-blue-800 text-xs rounded font-medium">Q${index + 1}</span>
                        <span class="px-2 py-1 bg-gray-100 text-gray-800 text-xs rounded">${q.subject_name || 'General'}</span>
                        <span class="px-2 py-1 bg-green-100 text-green-800 text-xs rounded font-medium">${q.marks || 1} marks</span>
                        ${q.type ? `<span class="px-2 py-1 bg-purple-100 text-purple-800 text-xs rounded">${q.type}</span>` : ''}
                    </div>
                    <p class="text-gray-800 mb-3">${escapeHtml(displayText)}</p>
                    
                    ${(q.option1 || q.option2 || q.option3 || q.option4) ? `
                    <div class="text-sm text-gray-600 mt-3">
                        <div class="flex flex-wrap gap-2 mb-1">
                            ${q.option1 ? `<span class="px-2 py-1 bg-blue-50 text-blue-700 rounded border border-blue-100">A: ${escapeHtml(q.option1.length > 30 ? q.option1.substring(0, 30) + '...' : q.option1)}</span>` : ''}
                            ${q.option2 ? `<span class="px-2 py-1 bg-blue-50 text-blue-700 rounded border border-blue-100">B: ${escapeHtml(q.option2.length > 30 ? q.option2.substring(0, 30) + '...' : q.option2)}</span>` : ''}
                            ${q.option3 ? `<span class="px-2 py-1 bg-blue-50 text-blue-700 rounded border border-blue-100">C: ${escapeHtml(q.option3.length > 30 ? q.option3.substring(0, 30) + '...' : q.option3)}</span>` : ''}
                            ${q.option4 ? `<span class="px-2 py-1 bg-blue-50 text-blue-700 rounded border border-blue-100">D: ${escapeHtml(q.option4.length > 30 ? q.option4.substring(0, 30) + '...' : q.option4)}</span>` : ''}
                        </div>
                        ${q.correct_answer ? `<div class="mt-1 text-green-600 font-medium">✓ Correct: ${escapeHtml(q.correct_answer)}</div>` : ''}
                    </div>
                    ` : ''}
                    
                    ${q.answer && !q.option1 ? `
                    <div class="text-sm text-gray-600 mt-3">
                        <div class="text-green-600 font-medium">Answer:</div>
                        <div class="mt-1 bg-green-50 p-2 rounded border border-green-100">${escapeHtml(q.answer.length > 100 ? q.answer.substring(0, 100) + '...' : q.answer)}</div>
                    </div>
                    ` : ''}
                </div>
                
                <div class="flex flex-col gap-2 ml-4">
                    <button onclick="editQuestionText(${index})" 
                            class="text-blue-600 hover:text-blue-800 hover:bg-blue-50 p-2 rounded transition-colors duration-200 text-sm" title="Edit question text">
                        <i class="fas fa-edit mr-1"></i> Text
                    </button>
                    <button onclick="editQuestionDetails(${index})" 
                            class="text-purple-600 hover:text-purple-800 hover:bg-purple-50 p-2 rounded transition-colors duration-200 text-sm" title="Edit all details">
                        <i class="fas fa-cog mr-1"></i> Full Edit
                    </button>
                    <button onclick="editQuestionMarks(${index})" 
                            class="text-green-600 hover:text-green-800 hover:bg-green-50 p-2 rounded transition-colors duration-200 text-sm" title="Edit marks">
                        <i class="fas fa-star mr-1"></i> Marks
                    </button>
                    <button onclick="removeQuestion(${index})" 
                            class="text-red-600 hover:text-red-800 hover:bg-red-50 p-2 rounded transition-colors duration-200 text-sm" title="Remove">
                        <i class="fas fa-trash mr-1"></i> Remove
                    </button>
                </div>
            </div>
        </div>`;
    });
    
    // Replace entire container content
    container.innerHTML = html;
}

// Update question and marks count
function updateQuestionCount() {
    document.getElementById('question-count').textContent = questions.length;
    const totalMarks = questions.reduce((sum, q) => sum + (parseInt(q.marks) || 1), 0);
    document.getElementById('total-marks').textContent = totalMarks;
}

// =================== UTILITY FUNCTIONS ===================

// Escape HTML to prevent XSS
function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Show toast notification
function showToast(message, type = 'success') {
    // Remove existing toast
    const existingToast = document.getElementById('custom-toast');
    if (existingToast) {
        existingToast.remove();
    }
    
    const bgColor = type === 'success' ? 'bg-green-500' : 'bg-red-500';
    const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
    
    const toastHtml = `
        <div id="custom-toast" class="fixed top-4 right-4 ${bgColor} text-white px-6 py-3 rounded-lg shadow-lg z-50 animate-slide-in">
            <div class="flex items-center">
                <i class="fas ${icon} mr-2"></i>
                <span>${message}</span>
            </div>
        </div>
    `;
    
    document.body.insertAdjacentHTML('beforeend', toastHtml);
    
    // Auto remove after 3 seconds
    setTimeout(() => {
        const toast = document.getElementById('custom-toast');
        if (toast) {
            toast.classList.add('animate-slide-out');
            setTimeout(() => toast.remove(), 300);
        }
    }, 3000);
}

// Save all changes to server
async function saveAllChanges() {
    const btn = document.getElementById('save-btn');
    const originalText = btn.innerHTML;
    
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Saving...';
    
    try {
        const response = await fetch('/teacher/update-paper-questions/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': '{{ csrf_token }}'
            },
            body: JSON.stringify({
                paper_id: paperId,
                selected_questions: questions
            })
        });
        
        const data = await response.json();
        
        if (data.success) {
            showToast('✅ All changes saved successfully!', 'success');
            // Update counts from server response
            if (data.total_questions) {
                document.getElementById('question-count').textContent = data.total_questions;
            }
            if (data.total_marks) {
                document.getElementById('total-marks').textContent = data.total_marks;
            }
        } else {
            showToast('❌ Error: ' + data.error, 'error');
            console.error('Save error:', data.error);
        }
    } catch (error) {
        showToast('❌ Network error: ' + error.message, 'error');
        console.error('Network error:', error);
    } finally {
        btn.disabled = false;
        btn.innerHTML = originalText;
    }
}
</script>

<style>
.animate-slide-in {
    animation: slideIn 0.3s ease-out;
}

.animate-slide-out {
    animation: slideOut 0.3s ease-in forwards;
}

@keyframes slideIn {
    from {
        transform: translateX(100%);
        opacity: 0;
    }
    to {
        transform: translateX(0);
        opacity: 1;
    }
}

@keyframes slideOut {
    from {
        transform: translateX(0);
        opacity: 1;
    }
    to {
        transform: translateX(100%);
        opacity: 0;
    }
}

/* Scrollbar styling for modal */
#edit-question-modal div > div > div.overflow-y-auto::-webkit-scrollbar {
    width: 6px;
}

#edit-question-modal div > div > div.overflow-y-auto::-webkit-scrollbar-track {
    background: #f1f1f1;
    border-radius: 3px;
}

#edit-question-modal div > div > div.overflow-y-auto::-webkit-scrollbar-thumb {
    background: #888;
    border-radius: 3px;
}

#edit-question-modal div > div > div.overflow-y-auto::-webkit-scrollbar-thumb:hover {
    background: #555;
}
</style>
{% endblock %}
